	<!-- Auto insert body -->
	<div id="homebar"></div>
	<noscript>
		<style>
			body {
				overflow: hidden;

	</noscript>
	<!-- Auto insert body end -->
	<div id="main">
		<div id="content">
			<h1>Easingエディター</h1>
			<div id="editor">
				<div id="graph">
					<canvas id="canvas" height="1000" width="1000"></canvas>
					<div id="p1" class="pointer" data-index="0" draggable="true"></div>
					<div id="p2" class="pointer" data-index="1" draggable="true"></div>
				</div>
				<div id="input">
					<div id="code">
						<span id="code-content"></span>
						<div id="code-copy">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="1.5" fill="none"
								stroke="currentColor">
								<path
									d="M8,8v-2a3,3 0 0 1 3-3h7a3,3 0 0 1 3,3v7a3,3 0 0 1-3,3h-2v2a3,3 0 0 1-3,3h-7a3,3 0 0 1-3-3v-7a3,3 0 0 1 3-3h7a3,3 0 0 1 3,3v5" />
							</svg>
						</div>
					</div>
					<label>ハンドルの表示：<input id="display-handles" type="checkbox" checked></label>
					<label>制御点1：
						<input id="x1" type="number" min="0" max="1" step="0.05" placeholder="x">
						<input id="y1" type="number" min="0" max="1" step="0.05" placeholder="y">
					</label>
					<label>制御点2：
						<input id="x2" type="number" min="0" max="1" step="0.05" placeholder="x">
						<input id="y2" type="number" min="0" max="1" step="0.05" placeholder="y">
					</label>
				</div>
			</div>
			<div id="animation">
				<input id="play-animation" type="checkbox">
				<div id="slid">
					<div id="slid-box"></div>
				</div>
			</div>
		</div>
	</div>
